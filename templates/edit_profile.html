<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile — MediHabit</title>
    <style>
        :root {
            --bg: #f5f5f3;
            --surface: #fff;
            --border: rgba(0,0,0,0.1);
            --text: #1a1a1a;
            --muted: #6b6b6b;
            --accent: #1a1a1a;
            --accent-fg: #fff;
            --danger: #d93025;
            --radius: 8px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .card {
            background: var(--surface);
            padding: 30px;
            border-radius: var(--radius);
            box-shadow: 0 4px 6px var(--border);
            border: 1px solid var(--border);
        }

        h2 {
            margin-bottom: 24px;
            font-size: 22px;
            font-weight: 600;
            text-align: center;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--muted);
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box; /* Ensures padding doesn't break layout */
        }

        input:focus {
            border-color: var(--accent);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 10px;
            text-decoration: none;
            display: block;
            text-align: center;
            box-sizing: border-box;
        }

        .btn-primary {
            background-color: var(--accent);
            color: var(--accent-fg);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
        }

        .alert {
            padding: 10px;
            border-radius: var(--radius);
            margin-bottom: 16px;
            font-size: 13px;
            text-align: center;
        }

        .alert-danger { background: #fcebeb; color: #791f1f; }
        .alert-success { background: #eaf3de; color: #27500a; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Edit Profile</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('edit_profile') }}" method="POST">
            
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" value="{{ user.name }}" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address (Cannot be changed)</label>
                <input type="email" id="email" value="{{ user.email }}" disabled style="background: #f9f9f9; cursor: not-allowed;">
            </div>

            <div class="form-group">
                <label for="password">New Password (Leave blank to keep current)</label>
                <input type="password" id="password" name="password" placeholder="••••••••">
            </div>

            <button type="submit" class="btn btn-primary">Update Profile</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Back to Dashboard</a>
        </form>
    </div>
</div>

</body>
</html>
