<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Medication — MediHabit</title>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --bg:#f5f5f3;
            --surface:#fff;
            --border:rgba(0,0,0,0.1);
            --text:#1a1a1a;
            --muted:#6b6b6b;
            --accent:#1a1a1a;
            --accent-fg:#fff;
            --radius:8px;
            --radius-lg:12px;
        }

        body{
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
            background:var(--bg);
            color:var(--text);
            padding:2rem 1rem;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        /* Floating Pop-up (Toast) Styling */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: auto;
            pointer-events: none;
        }

        .flash {
            background: rgba(144, 238, 144, 0.85); /* Transparent Light Green */
            color: #000; /* Black text */
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            border: 1px solid rgba(0,0,0,0.05);
            margin-bottom: 10px;
            backdrop-filter: blur(8px); /* Glassmorphism effect */
            animation: slideDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            white-space: nowrap;
        }

        @keyframes slideDown {
            from { transform: translateY(-30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Card & Form Styling */
        .card{
            background:var(--surface);
            border:1px solid var(--border);
            border-radius:var(--radius-lg);
            padding:1.5rem;
            width:100%;
            max-width:450px;
            box-shadow:0 4px 6px -1px rgba(0,0,0,0.1);
        }

        h2{font-size:20px;font-weight:600;margin-bottom:1.5rem;text-align:center}

        .field{margin-bottom:16px}
        label{
            display:block;
            font-size:12px;
            font-weight:600;
            color:var(--muted);
            margin-bottom:6px;
            text-transform:uppercase;
            letter-spacing:0.025em;
        }

        input, select, textarea{
            width:100%;
            padding:10px 12px;
            border:1px solid var(--border);
            border-radius:var(--radius);
            font-size:14px;
            font-family:inherit;
            outline:none;
            transition:border-color .15s;
        }
        input:focus, textarea:focus{border-color:var(--accent)}

        .btn-group{margin-top:24px;display:flex;flex-direction:column;gap:10px}
        
        .btn{
            display:inline-flex;
            align-items:center;
            justify-content:center;
            padding:12px;
            background:var(--accent);
            color:var(--accent-fg);
            border:none;
            border-radius:var(--radius);
            font-weight:500;
            font-size:14px;
            cursor:pointer;
            text-decoration:none;
            transition:opacity .15s;
        }
        .btn:hover{opacity:0.9}

        .btn-ghost{
            background:transparent;
            color:var(--muted);
            border:1px solid var(--border);
        }
        .btn-ghost:hover{background:var(--bg);color:var(--text)}

    </style>
</head>
<body>

<div class="toast-container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
</div>

<div class="card">
    <h2>Update Medication</h2>
    
    <form action="{{ url_for('edit_medication', id=med.id) }}" method="POST">
        <div class="field">
            <label>Medication Name</label>
            <input type="text" name="name" value="{{ med.name }}" placeholder="e.g. Paracetamol" required>
        </div>
        
        <div class="field">
            <label>Dose / Strength</label>
            <input type="text" name="dose" value="{{ med.dose }}" placeholder="e.g. 500mg or 1 Tablet">
        </div>

        <div class="field">
            <label>Primary Reminder Time</label>
            <input type="time" name="time1" value="{{ med.time1 }}" required>
        </div>

        <div class="field">
            <label>Secondary Time (Optional)</label>
            <input type="time" name="time2" value="{{ med.time2 if med.time2 else '' }}">
        </div>

        <div class="field">
            <label>Recipient Email</label>
            <input type="email" name="recipient_email" value="{{ med.recipient_email }}" required>
        </div>

        <div class="field">
            <label>Notes</label>
            <textarea name="notes" rows="3" placeholder="Special instructions...">{{ med.notes }}</textarea>
        </div>

        <div class="field" style="display:flex; align-items:center; gap:8px;">
            <input type="checkbox" name="email_enabled" id="email_enabled" style="width:auto" {% if med.email_enabled %}checked{% endif %}>
            <label for="email_enabled" style="margin-bottom:0; text-transform:none;">Enable Email Alerts</label>
        </div>

        <div class="btn-group">
            <button type="submit" class="btn">Save Changes</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-ghost">Discard & Go Back</a>
        </div>
    </form>
</div>

<script>
    // Automatically fade out and remove pop-ups after 3 seconds
    setTimeout(() => {
        const flashes = document.querySelectorAll('.flash');
        flashes.forEach(f => {
            f.style.transition = "opacity 0.6s ease, transform 0.6s ease";
            f.style.opacity = "0";
            f.style.transform = "translateY(-20px)";
            setTimeout(() => f.remove(), 600);
        });
    }, 3000);
</script>

</body>
</html>
