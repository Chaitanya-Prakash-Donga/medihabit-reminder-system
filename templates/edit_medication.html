<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Medication — MediHabit</title>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--bg:#f5f5f3;--surface:#fff;--border:rgba(0,0,0,0.1);--text:#1a1a1a;--muted:#6b6b6b;--accent:#1a1a1a;--accent-fg:#fff;--danger-bg:#FCEBEB;--danger:#791F1F;--success-bg:#E6F4EA;--success:#137333;--radius:8px;--radius-lg:12px}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);padding:2rem 1rem;min-height:100vh;display:flex;align-items:center;justify-content:center}
        .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;width:100%;max-width:450px;box-shadow:0 4px 6px -1px rgba(0,0,0,0.1)}
        .field{margin-bottom:16px}
        label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.025em}
        input, select, textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;font-family:inherit;outline:none;transition:border-color .15s}
        input:focus, textarea:focus{border-color:var(--accent)}
        .btn-group{margin-top:24px;display:flex;flex-direction:column;gap:10px}
        .btn{display:inline-flex;align-items:center;justify-content:center;padding:12px;background:var(--accent);color:var(--accent-fg);border:none;border-radius:var(--radius);font-weight:500;font-size:14px;cursor:pointer;text-decoration:none;transition:opacity .15s}
        .btn:hover{opacity:0.9}
        .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
        .btn-ghost:hover{background:var(--bg);color:var(--text)}
        
        /* Message styling - changed alert to flash to match your CSS classes */
        .flash{padding:10px 14px;border-radius:var(--radius);margin-bottom:1.5rem;font-size:14px; text-align: center;}
        .flash-danger{background:var(--danger-bg);color:var(--danger)}
        .flash-success{background:var(--success-bg);color:var(--success)}
        
        h2{font-size:20px;font-weight:600;margin-bottom:1.5rem;text-align:center}
    </style>
</head>
<body>

<div class="card">
    <h2>Update Medication</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    
    <form action="{{ url_for('edit_medication', id=med.id) }}" method="POST">
        <div class="field">
            <label>Medication Name</label>
            <input type="text" name="name" value="{{ med.name }}" placeholder="e.g. Paracetamol" required>
        </div>
        
        <div class="field">
            <label>Dose / Strength</label>
            <input type="text" name="dose" value="{{ med.dose }}" placeholder="e.g. 500mg or 1 Tablet">
        </div>

        <div class="field">
            <label>Primary Reminder Time</label>
            <input type="time" name="time1" value="{{ med.time1 }}" required>
        </div>

        <div class="field">
            <label>Secondary Time (Optional)</label>
            <input type="time" name="time2" value="{{ med.time2 if med.time2 else '' }}">
        </div>

        <div class="field">
            <label>Recipient Email</label>
            <input type="email" name="recipient_email" value="{{ med.recipient_email }}" required>
        </div>

        <div class="field">
            <label>Notes</label>
            <textarea name="notes" rows="3" placeholder="Special instructions...">{{ med.notes }}</textarea>
        </div>

        <div class="field" style="display:flex; align-items:center; gap:8px;">
            <input type="checkbox" name="email_enabled" id="email_enabled" style="width:auto" {% if med.email_enabled %}checked{% endif %}>
            <label for="email_enabled" style="margin-bottom:0">Enable Email Alerts</label>
        </div>

        <div class="btn-group">
            <button type="submit" class="btn">Save Changes</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-ghost">Discard & Go Back</a>
        </div>
    </form>
</div>

</body>
</html>
