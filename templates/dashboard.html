<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MediHabit — Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f5f3;--surface:#fff;--border:rgba(0,0,0,0.1);--text:#1a1a1a;--muted:#6b6b6b;--accent:#1a1a1a;--accent-fg:#fff;--info-bg:#E6F1FB;--info:#0C447C;--success-bg:#EAF3DE;--success:#27500A;--danger-bg:#FCEBEB;--danger:#791F1F;--radius:8px;--radius-lg:12px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
input,select{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:border-color .15s}
input:focus,select:focus{border-color:var(--accent)}
label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px}
.nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.nav-logo{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:500;text-decoration:none;color:var(--text)}
.logo-icon{width:30px;height:30px;border-radius:8px;background:var(--info-bg);display:flex;align-items:center;justify-content:center;font-size:15px}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--info-bg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--info)}
.page{max-width:760px;margin:0 auto;padding:1.5rem 1.25rem}
.page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.25rem}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem}
.stat-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px}
.stat-label{font-size:11px;color:var(--muted);margin-bottom:4px}
.stat-val{font-size:24px;font-weight:500}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:1rem}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.card-title{font-size:14px;font-weight:500}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:8px 16px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:14px;font-family:inherit;cursor:pointer;text-decoration:none;transition:background .15s}
.btn:hover{background:var(--bg)}
.btn-primary{background:var(--accent);color:var(--accent-fg);border-color:var(--accent)}
.btn-primary:hover{opacity:.85;background:var(--accent)}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-info{border-color:#85B7EB;color:var(--info)}
.btn-info:hover{background:var(--info-bg)}
.btn-success{border-color:#C0DD97;color:var(--success)}
.btn-success:hover{background:var(--success-bg)}
.btn-danger{border-color:#F09595;color:var(--danger)}
.btn-danger:hover{background:var(--danger-bg)}
.btn-cancel{background:transparent;color:var(--muted)}
.badge{font-size:11px;font-weight:500;padding:3px 8px;border-radius:20px}
.b-blue{background:var(--info-bg);color:var(--info)}
.b-green{background:var(--success-bg);color:var(--success)}
.med-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.med-row:last-child{border-bottom:none}
.med-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.med-body{flex:1;min-width:0}
.med-name{font-size:14px;font-weight:500}
.med-sub{font-size:12px;color:var(--muted);margin-top:2px}
.chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;align-items:center}
.chip{font-size:11px;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:2px 8px;color:var(--muted)}
.med-acts{display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap}
.log-row{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.log-row:last-child{border-bottom:none}
.log-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--info-bg);font-size:14px}
.log-title{font-size:13px;font-weight:500}
.log-sub{font-size:11px;color:var(--muted);margin-top:2px}
.log-ok{font-size:11px;color:var(--success);margin-top:3px}
.field{margin-bottom:12px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.section-label{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:0 0 8px}
.check-row{display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;margin-bottom:8px}
.check-row input{width:auto}
.empty{text-align:center;padding:2rem;color:var(--muted);font-size:13px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--accent);color:var(--accent-fg);padding:10px 20px;border-radius:var(--radius);font-size:13px;display:none;white-space:nowrap;z-index:999}
.add-form{display:none;margin-bottom:1rem}
.add-form.open{display:block}
@media(max-width:520px){.stat-grid{grid-template-columns:1fr 1fr}.row2{grid-template-columns:1fr}.med-acts{flex-wrap:wrap}.page{padding:1rem .75rem}}
</style>
</head>
<body>

<nav class="nav">
  <a href="dashboard.html" class="nav-logo">
    <div class="logo-icon">💊</div>
    MediHabit
  </a>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="avatar">RK</div>
    <span style="font-size:13px;color:var(--muted)">Ravi Kumar</span>
    <a href="login.html" class="btn btn-sm">Log out</a>
  </div>
</nav>

<div class="page">
  <div id="toast" class="toast"></div>

  <div class="page-header">
    <div>
      <h1 style="font-size:20px;font-weight:500">Dashboard</h1>
      <p style="font-size:12px;color:var(--muted)" id="today"></p>
    </div>
    <button class="btn btn-primary btn-sm" onclick="toggleForm()">+ Add medication</button>
  </div>

  <div class="stat-grid">
    <div class="stat-card"><div class="stat-label">Medications</div><div class="stat-val" id="s-meds">3</div></div>
    <div class="stat-card"><div class="stat-label">Alerts today</div><div class="stat-val" id="s-alerts">5</div></div>
    <div class="stat-card"><div class="stat-label">Sent today</div><div class="stat-val" id="s-sent">4</div></div>
  </div>

  <div id="add-form" class="add-form">
    <div class="section-label">New medication</div>
    <div class="card">
      <div class="field"><label>Medication name *</label><input type="text" id="f-name" placeholder="e.g. Metformin 500mg"/></div>
      <div class="row2">
        <div class="field"><label>Dosage</label><input type="text" id="f-dose" placeholder="e.g. 1 tablet"/></div>
        <div class="field"><label>Frequency</label>
          <select id="f-freq"><option>Once daily</option><option>Twice daily</option><option>Three times daily</option><option>As needed</option></select>
        </div>
      </div>
      <div class="row2">
        <div class="field"><label>Time 1 *</label><input type="time" id="f-t1" value="08:00"/></div>
        <div class="field"><label>Time 2 (optional)</label><input type="time" id="f-t2"/></div>
      </div>
      <div class="field"><label>Recipient email *</label><input type="email" id="f-email" placeholder="patient@email.com"/></div>
      <div class="field"><label>Notes</label><input type="text" id="f-notes" placeholder="e.g. Take after meals"/></div>
      <label class="check-row"><input type="checkbox" id="f-email-on" checked/> Send email reminder</label>
      <div style="display:flex;gap:8px;margin-top:4px">
        <button class="btn btn-primary btn-sm" onclick="saveMed()">Save & schedule</button>
        <button class="btn btn-sm btn-cancel" onclick="toggleForm()">Cancel</button>
      </div>
    </div>
  </div>

  <div class="section-label">Today's medications</div>
  <div class="card" style="padding:.75rem 1.25rem"><div id="med-list"></div></div>

  <div class="section-label">Today's alert log</div>
  <div class="card" style="padding:.75rem 1.25rem"><div id="log-list"></div></div>
</div>

<script>
const DOTS=['#378ADD','#1D9E75','#EF9F27','#D85A30','#7F77DD'];
let editId=null;

let meds=[
  {id:1,name:'Metformin 500mg',dose:'1 tablet',freq:'Twice daily',t1:'08:00',t2:'20:00',email:'ravi@email.com',notes:'After meals',emailOn:true},
  {id:2,name:'Amlodipine 5mg',dose:'1 tablet',freq:'Once daily',t1:'09:00',t2:'',email:'ravi@email.com',notes:'',emailOn:true},
  {id:3,name:'Vitamin D3',dose:'1 capsule',freq:'Once daily',t1:'10:00',t2:'',email:'ravi@email.com',notes:'With breakfast',emailOn:true},
];

let logs=[
  {type:'email',med:'Metformin 500mg',to:'ravi@email.com',time:'8:00 AM',status:'sent'},
  {type:'email',med:'Amlodipine 5mg',to:'ravi@email.com',time:'9:00 AM',status:'sent'},
  {type:'email',med:'Vitamin D3',to:'ravi@email.com',time:'10:00 AM',status:'sent'},
  {type:'email',med:'Metformin 500mg',to:'ravi@email.com',time:'8:00 PM',status:'sent'},
];

function fmt(t){if(!t)return'';const[h,m]=t.split(':').map(Number);return((h%12)||12)+':'+String(m).padStart(2,'0')+' '+(h>=12?'PM':'AM');}

document.getElementById('today').textContent=new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

function renderMeds(){
  const el=document.getElementById('med-list');
  if(!meds.length){el.innerHTML='<div class="empty">No medications yet.</div>';return;}
  el.innerHTML=meds.map((m,i)=>`
    <div class="med-row">
      <div class="med-dot" style="background:${DOTS[i%DOTS.length]}"></div>
      <div class="med-body">
        <div class="med-name">${m.name}</div>
        <div class="med-sub">${m.dose?m.dose+' · ':''}${m.freq}${m.notes?' · '+m.notes:''}</div>
        <div class="chips">
          ${m.t1?`<span class="chip">${fmt(m.t1)}</span>`:''}
          ${m.t2?`<span class="chip">${fmt(m.t2)}</span>`:''}
          ${m.emailOn?'<span class="badge b-blue">Email</span>':''}
        </div>
      </div>
      <div class="med-acts">
        <a href="edit_medication.html?id=${m.id}" class="btn btn-sm btn-info">Edit</a>
        <button class="btn btn-sm btn-success" onclick="testSend(${m.id})">Send now</button>
        <button class="btn btn-sm btn-danger" onclick="delMed(${m.id})">Remove</button>
      </div>
    </div>`).join('');
  document.getElementById('s-meds').textContent=meds.length;
  document.getElementById('s-alerts').textContent=meds.reduce((a,m)=>a+(m.t1?1:0)+(m.t2?1:0),0);
}

function renderLogs(){
  const el=document.getElementById('log-list');
  if(!logs.length){el.innerHTML='<div class="empty">No alerts sent yet.</div>';return;}
  el.innerHTML=[...logs].reverse().map(l=>`
    <div class="log-row">
      <div class="log-icon">✉️</div>
      <div>
        <div class="log-title">Email · ${l.med}</div>
        <div class="log-sub">${l.to} · ${l.time}</div>
        <div class="log-ok">Sent</div>
      </div>
    </div>`).join('');
  document.getElementById('s-sent').textContent=logs.filter(l=>l.status==='sent').length;
}

function toggleForm(){
  const f=document.getElementById('add-form');
  f.classList.toggle('open');
  editId=null;
  if(f.classList.contains('open'))f.scrollIntoView({behavior:'smooth'});
}

function saveMed(){
  const name=document.getElementById('f-name').value.trim();
  const email=document.getElementById('f-email').value.trim();
  const t1=document.getElementById('f-t1').value;
  if(!name||!email||!t1){toast('Name, email and time are required.');return;}
  meds.push({id:Date.now(),name,dose:document.getElementById('f-dose').value.trim(),
    freq:document.getElementById('f-freq').value,t1,
    t2:document.getElementById('f-t2').value||'',email,
    notes:document.getElementById('f-notes').value.trim(),
    emailOn:document.getElementById('f-email-on').checked});
  document.getElementById('add-form').classList.remove('open');
  ['f-name','f-dose','f-email','f-notes','f-t2'].forEach(id=>document.getElementById(id).value='');
  renderMeds();toast('Medication added and reminders scheduled!');
}

function delMed(id){
  const m=meds.find(x=>x.id===id);
  if(!confirm(`Remove "${m.name}"?`))return;
  meds=meds.filter(x=>x.id!==id);renderMeds();toast(`"${m.name}" removed.`);
}

function testSend(id){
  const m=meds.find(x=>x.id===id);if(!m)return;
  const t=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  if(m.emailOn&&m.email)logs.push({type:'email',med:m.name,to:m.email,time:t,status:'sent'});
  renderLogs();toast('Reminder sent!');
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.display='block';
  setTimeout(()=>t.style.display='none',2500);
}

renderMeds();renderLogs();
</script>
</body>
</html>
